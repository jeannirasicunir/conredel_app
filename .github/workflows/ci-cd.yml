name: "ECR-ECS-Monitoring-Deployment"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
  PYTHON_VERSION: '3.12'

jobs:
  initialize-ecr:
    name: Initialize ECR Repositories
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Create ECR repositories if they don't exist
      run: |
        for repo in "monitoring/backend" "monitoring/prometheus" "monitoring/grafana"; do
          aws ecr describe-repositories --repository-names "$repo" || {
            echo "Creating repository $repo"
            aws ecr create-repository --repository-name "$repo" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE
          }
        done

  test:
    name: Test Application
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        cd backend
        python manage.py test

  build-and-push:
    name: Build and Push to ECR
    needs: [test, initialize-ecr]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push backend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd backend
        docker build -t $ECR_REGISTRY/monitoring/backend:${{ github.sha }} .
        docker push $ECR_REGISTRY/monitoring/backend:${{ github.sha }}
        docker tag $ECR_REGISTRY/monitoring/backend:${{ github.sha }} $ECR_REGISTRY/monitoring/backend:latest
        docker push $ECR_REGISTRY/monitoring/backend:latest

    - name: Build and push Prometheus image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd monitoring
        docker build -t $ECR_REGISTRY/monitoring/prometheus:${{ github.sha }} .
        docker push $ECR_REGISTRY/monitoring/prometheus:${{ github.sha }}
        docker tag $ECR_REGISTRY/monitoring/prometheus:${{ github.sha }} $ECR_REGISTRY/monitoring/prometheus:latest
        docker push $ECR_REGISTRY/monitoring/prometheus:latest

    - name: Build and push Grafana image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        cd monitoring/grafana
        docker build -t $ECR_REGISTRY/monitoring/grafana:${{ github.sha }} .
        docker push $ECR_REGISTRY/monitoring/grafana:${{ github.sha }}
        docker tag $ECR_REGISTRY/monitoring/grafana:${{ github.sha }} $ECR_REGISTRY/monitoring/grafana:latest
        docker push $ECR_REGISTRY/monitoring/grafana:latest

  terraform:
    name: Terraform Apply
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: 1.4.2

    - name: Create and Import DynamoDB Lock Table
      env:
        TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
        TF_VAR_django_debug: "False"
        TF_VAR_django_allowed_hosts: "*"
        TF_VAR_api_token: ${{ secrets.API_TOKEN }}
        TF_VAR_app_name: "monitoring"
        TF_VAR_environment: "production"
        TF_VAR_desired_count: "1"
      run: |
        echo "Checking DynamoDB table for Terraform state locking..."
        
        # Check if table exists
        if ! aws dynamodb describe-table --table-name terraform-lock-table 2>/dev/null; then
          echo "Table does not exist, creating..."
          aws dynamodb create-table \
            --table-name terraform-lock-table \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${{ env.AWS_REGION }}
        fi
        
        echo "Waiting for table to be active..."
        RETRY_COUNT=0
        MAX_RETRIES=30
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          STATUS=$(aws dynamodb describe-table --table-name terraform-lock-table --query 'Table.TableStatus' --output text 2>/dev/null || echo "NOTFOUND")
          if [ "$STATUS" = "ACTIVE" ]; then
            echo "DynamoDB table is active and ready"
            break
          elif [ "$STATUS" = "NOTFOUND" ]; then
            echo "Waiting for table to be created... (Attempt $RETRY_COUNT of $MAX_RETRIES)"
            sleep 5
          else
            echo "Table status: $STATUS, waiting... (Attempt $RETRY_COUNT of $MAX_RETRIES)"
            sleep 5
          fi
          RETRY_COUNT=$((RETRY_COUNT + 1))
        done
        
        if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
          echo "Timeout waiting for table to become active"
          exit 1
        fi
        
        # Change to Terraform directory for import
        cd deployment/terraform
        
        # Import the table into Terraform state if it exists
        echo "Importing DynamoDB table into Terraform state..."
        terraform init -input=false
        
        # Check if resource is already in state
        if ! terraform state show aws_dynamodb_table.terraform_lock 2>/dev/null; then
          echo "Importing DynamoDB table into state..."
          terraform import -input=false aws_dynamodb_table.terraform_lock terraform-lock-table || {
            echo "Failed to import DynamoDB table"
            exit 1
          }
        else
          echo "DynamoDB table already in Terraform state"
        fi

    - name: Terraform Init and Import ECR Repositories
      env:
        TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
        TF_VAR_django_debug: "False"
        TF_VAR_django_allowed_hosts: "*"
        TF_VAR_api_token: ${{ secrets.API_TOKEN }}
        TF_VAR_app_name: "monitoring"
        TF_VAR_environment: "production"
        TF_VAR_desired_count: "1"
      run: |
        cd deployment/terraform
        terraform init
        
        # Get AWS account ID
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
        
        # Import existing repositories if they exist
        for repo in "monitoring/backend" "monitoring/prometheus" "monitoring/grafana"; do
          if aws ecr describe-repositories --repository-names "$repo" 2>/dev/null; then
            echo "Importing existing repository: $repo"
            terraform import -input=false "aws_ecr_repository.${repo##*/}" "$repo" || true
          fi
        done
        
        # Verify state to ensure no resource is already imported
        terraform state list

    - name: Check and Clear Terraform Lock
      run: |
        cd deployment/terraform
        echo "Checking for existing state lock..."
        if aws dynamodb get-item \
          --table-name terraform-lock-table \
          --key '{"LockID": {"S": "monitoring-terraform-state-819743217287/monitoring.tfstate"}}' \
          --output json | grep -q "Item"; then
          echo "Found existing lock, removing it..."
          aws dynamodb delete-item \
            --table-name terraform-lock-table \
            --key '{"LockID": {"S": "monitoring-terraform-state-819743217287/monitoring.tfstate"}}'
          echo "Lock removed"
          sleep 10  # Wait a moment for consistency
        else
          echo "No existing lock found"
        fi

    - name: Terraform Plan with Lock Handling
      timeout-minutes: 10
      env:
        TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
        TF_VAR_django_debug: "False"
        TF_VAR_django_allowed_hosts: "*"
        TF_VAR_api_token: ${{ secrets.API_TOKEN }}
        TF_VAR_app_name: "monitoring"
        TF_VAR_environment: "production"
        TF_VAR_desired_count: "1"
      run: |
        cd deployment/terraform
        
        # Function to check and clear lock if needed
        check_and_clear_lock() {
          if aws dynamodb get-item \
            --table-name terraform-lock-table \
            --key '{"LockID": {"S": "monitoring-terraform-state-819743217287/monitoring.tfstate"}}' \
            --output json 2>/dev/null | grep -q "Item"; then
            echo "Found existing lock, removing it..."
            aws dynamodb delete-item \
              --table-name terraform-lock-table \
              --key '{"LockID": {"S": "monitoring-terraform-state-819743217287/monitoring.tfstate"}}'
            echo "Lock removed"
            sleep 5
          fi
        }
        
        # Clear any existing locks
        check_and_clear_lock
        
        # Verify table is ready
        echo "Verifying DynamoDB table status..."
        aws dynamodb describe-table --table-name terraform-lock-table --query 'Table.TableStatus' --output text
        
        # Run plan with retries
        MAX_RETRIES=3
        RETRY_COUNT=0
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if TF_LOG=DEBUG terraform plan -input=false -out=tfplan; then
            echo "Plan completed successfully"
            break
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Plan failed, attempt $RETRY_COUNT of $MAX_RETRIES. Clearing lock and retrying..."
              check_and_clear_lock
              sleep 5
            else
              echo "Plan failed after $MAX_RETRIES attempts"
              exit 1
            fi
          fi
        done

    - name: Terraform Apply with Lock Handling
      timeout-minutes: 30
      env:
        TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
        TF_VAR_django_debug: "False"
        TF_VAR_django_allowed_hosts: "*"
        TF_VAR_api_token: ${{ secrets.API_TOKEN }}
        TF_VAR_app_name: "monitoring"
        TF_VAR_environment: "production"
        TF_VAR_desired_count: "1"
      run: |
        cd deployment/terraform
        
        # Function to check and clear lock if needed
        check_and_clear_lock() {
          if aws dynamodb get-item \
            --table-name terraform-lock-table \
            --key '{"LockID": {"S": "monitoring-terraform-state-819743217287/monitoring.tfstate"}}' \
            --output json 2>/dev/null | grep -q "Item"; then
            echo "Found existing lock, removing it..."
            aws dynamodb delete-item \
              --table-name terraform-lock-table \
              --key '{"LockID": {"S": "monitoring-terraform-state-819743217287/monitoring.tfstate"}}'
            echo "Lock removed"
            sleep 5
          fi
        }
        
        # Function to create new plan
        create_plan() {
          echo "Creating new Terraform plan..."
          terraform plan -input=false -out=tfplan
        }
        
        # Verify table is ready
        echo "Verifying DynamoDB table status..."
        aws dynamodb describe-table --table-name terraform-lock-table --query 'Table.TableStatus' --output text
        
        # Run apply with retries
        MAX_RETRIES=3
        RETRY_COUNT=0
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          # Clear any existing locks before starting
          check_and_clear_lock
          
          # Create a fresh plan
          if ! create_plan; then
            echo "Failed to create plan"
            RETRY_COUNT=$((RETRY_COUNT + 1))
            continue
          fi
          
          if terraform apply -auto-approve tfplan; then
            echo "Apply completed successfully"
            break
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Apply failed, attempt $RETRY_COUNT of $MAX_RETRIES. Clearing lock and retrying with new plan..."
              check_and_clear_lock
              sleep 5
            else
              echo "Apply failed after $MAX_RETRIES attempts"
              exit 1
            fi
          fi
        done

  deploy:
    name: Deploy to ECS
    needs: terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    # Add a delay to allow AWS resources to be fully created
    concurrency: 
      group: production_deploy
      cancel-in-progress: false
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Wait for cluster and force new deployment
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ env.AWS_REGION }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
      run: |
        echo "Waiting for ECS cluster to be available..."
        RETRY_COUNT=0
        MAX_RETRIES=30
        
        until aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER_NAME }} --query 'clusters[0].status' --output text 2>/dev/null | grep -q "ACTIVE" || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
          echo "Waiting for cluster to be active... (Attempt $RETRY_COUNT of $MAX_RETRIES)"
          sleep 10
          RETRY_COUNT=$((RETRY_COUNT + 1))
        done

        if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
          echo "Timeout waiting for cluster to become active"
          exit 1
        fi

        echo "Cluster is active, checking service..."
        aws ecs describe-services --cluster ${{ env.ECS_CLUSTER_NAME }} --services ${{ env.ECS_SERVICE_NAME }}

        echo "Forcing new deployment..."
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER_NAME }} --service ${{ env.ECS_SERVICE_NAME }} --force-new-deployment

    - name: Check service health
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ env.AWS_REGION }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
      run: |
        set -e  # Exit on error
        
        echo "Getting Load Balancer DNS..."
        LB_DNS=$(aws elbv2 describe-load-balancers \
          --region "$AWS_REGION" \
          --names monitoring-alb \
          --query 'LoadBalancers[0].DNSName' \
          --output text)
          
        if [ $? -ne 0 ] || [ -z "$LB_DNS" ] || [ "$LB_DNS" = "None" ]; then
          echo "Error: Could not fetch load balancer information"
          exit 1
        fi
        
        # Wait for services to be healthy
        echo "Checking service health..."
        MAX_RETRIES=30
        RETRY_COUNT=0
        
        check_endpoint() {
          local url=$1
          local endpoint=$2
          curl -s -f -m 5 "$url$endpoint" > /dev/null
          return $?
        }
        
        echo "Waiting for services to be available..."
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          SERVICES_UP=0
          
          # Check Backend
          if check_endpoint "http://$LB_DNS:8000" "/api/health/"; then
            echo "Backend is up"
            SERVICES_UP=$((SERVICES_UP + 1))
          else
            echo "Backend is not ready"
          fi
          
          # Check Prometheus
          if check_endpoint "http://$LB_DNS:9090" "/-/healthy"; then
            echo "Prometheus is up"
            SERVICES_UP=$((SERVICES_UP + 1))
          else
            echo "Prometheus is not ready"
          fi
          
          # Check Grafana
          if check_endpoint "http://$LB_DNS:3000" "/api/health"; then
            echo "Grafana is up"
            SERVICES_UP=$((SERVICES_UP + 1))
          else
            echo "Grafana is not ready"
          fi
          
          if [ $SERVICES_UP -eq 3 ]; then
            echo "All services are up!"
            break
          fi
          
          RETRY_COUNT=$((RETRY_COUNT + 1))
          if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
            echo "Retrying in 10 seconds... (Attempt $RETRY_COUNT of $MAX_RETRIES)"
            sleep 10
          fi
        done
        
        if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
          echo "Timeout waiting for services to be healthy"
          exit 1
        fi

    - name: Print deployment summary and validate endpoints
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ env.AWS_REGION }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
      run: |
        LB_DNS=$(aws elbv2 describe-load-balancers \
          --region "$AWS_REGION" \
          --names monitoring-alb \
          --query 'LoadBalancers[0].DNSName' \
          --output text)

        echo "============================================"
        echo "  DEPLOYMENT SUMMARY"
        echo "============================================"
        echo ""
        echo "  Backend API : http://$LB_DNS:8000"
        echo "  Prometheus  : http://$LB_DNS:9090"
        echo "  Grafana     : http://$LB_DNS:3000"
        echo ""
        echo "============================================"
        echo ""

        echo "--- Validating Backend health endpoint ---"
        RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "http://$LB_DNS:8000/api/health/")
        BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
        STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
        echo "Response body   : $BODY"
        echo "HTTP status code: $STATUS"
        [ "$STATUS" = "200" ] && echo "✔ Backend OK" || { echo "✘ Backend returned unexpected status $STATUS"; exit 1; }

        echo ""
        echo "--- Validating Prometheus health endpoint ---"
        RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "http://$LB_DNS:9090/-/healthy")
        STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
        echo "HTTP status code: $STATUS"
        [ "$STATUS" = "200" ] && echo "✔ Prometheus OK" || { echo "✘ Prometheus returned unexpected status $STATUS"; exit 1; }

        echo ""
        echo "--- Validating Grafana health endpoint ---"
        RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "http://$LB_DNS:3000/api/health")
        BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
        STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
        echo "Response body   : $BODY"
        echo "HTTP status code: $STATUS"
        [ "$STATUS" = "200" ] && echo "✔ Grafana OK" || { echo "✘ Grafana returned unexpected status $STATUS"; exit 1; }

        echo ""
        echo "============================================"
        echo "  ALL SERVICES HEALTHY - DEPLOYMENT DONE"
        echo "============================================"
